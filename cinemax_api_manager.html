<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMax API Content Manager</title>
    <style>
        :root {
            --primary: #e50914;
            --secondary: #221f1f;
            --dark: #141414;
            --light: #f4f4f4;
            --success: #46d369;
            --warning: #ffc107;
            --danger: #dc3545;
            --info: #17a2b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Netflix Sans', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, var(--secondary) 100%);
            color: var(--light);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, var(--primary), #b20710);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .card h2 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--light);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: var(--light);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255,255,255,0.15);
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary), #b20710);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.4);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-info {
            background: var(--info);
            color: white;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .tabs {
            display: flex;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .tab {
            flex: 1;
            padding: 15px 20px;
            background: none;
            border: none;
            color: var(--light);
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .result {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid var(--primary);
        }

        .result pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.4;
            max-height: 400px;
            overflow-y: auto;
        }

        .progress {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            width: 0%;
            transition: width 0.3s ease;
        }

        .status {
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: 600;
        }

        .status.success {
            background: rgba(70, 211, 105, 0.2);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .status.error {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .status.info {
            background: rgba(23, 162, 184, 0.2);
            border: 1px solid var(--info);
            color: var(--info);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .movie-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid var(--primary);
            transition: all 0.3s ease;
        }

        .movie-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }

        .movie-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .movie-info {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .source-info {
            background: rgba(70, 211, 105, 0.2);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            display: inline-block;
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-item input[type="checkbox"] {
            width: auto;
        }

        .api-key-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-left: 10px;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .api-key-status.valid {
            background: rgba(70, 211, 105, 0.2);
            color: var(--success);
        }

        .api-key-status.invalid {
            background: rgba(220, 53, 69, 0.2);
            color: var(--danger);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .row {
                grid-template-columns: 1fr;
            }
            
            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 CineMax API Content Manager</h1>
            <p>Generate movies and TV series content automatically using TMDB API with VidSrc integration</p>
        </div>

        <div class="card">
            <h2>🔑 API Configuration</h2>
            <div class="form-group">
                <label for="tmdbApiKey">TMDB API Key:</label>
                <input type="password" id="tmdbApiKey" value="ec926176bf467b3f7735e3154238c161" placeholder="Enter your TMDB API key">
                <span id="apiKeyStatus" class="api-key-status"></span>
            </div>
            <button class="btn btn-info" onclick="validateApiKey()">🔍 Validate API Key</button>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('bulk')">📚 Bulk Generation</button>
                <button class="tab" onclick="switchTab('manual')">🎯 Manual ID Generation</button>
                <button class="tab" onclick="switchTab('search')">🔍 Search & Generate</button>
            </div>

            <div id="bulk" class="tab-content active">
                <h2>📚 Bulk Content Generation</h2>
                <div class="row">
                    <div>
                        <div class="form-group">
                            <label for="contentType">Content Type:</label>
                            <select id="contentType">
                                <option value="movie">Movies</option>
                                <option value="tv">TV Series</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="releaseYear">Release Year:</label>
                            <input type="number" id="releaseYear" value="2023" min="1900" max="2025">
                        </div>
                        <div class="form-group">
                            <label for="pageCount">Number of Pages to Generate:</label>
                            <input type="number" id="pageCount" value="5" min="1" max="20">
                        </div>
                    </div>
                    <div>
                        <div class="form-group">
                            <label>Video Source Options:</label>
                            <div class="checkbox-group">
                                <div class="checkbox-item">
                                    <input type="checkbox" id="includeVidsrc" checked>
                                    <label for="includeVidsrc">VidSrc Embed</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="includeDirectLinks">
                                    <label for="includeDirectLinks">Direct Links</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="includeYoutube">
                                    <label for="includeYoutube">YouTube Trailers</label>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="minRating">Minimum Rating (0-10):</label>
                            <input type="number" id="minRating" value="6" min="0" max="10" step="0.1">
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="generateBulkContent()">🚀 Generate Bulk Content</button>
            </div>

            <div id="manual" class="tab-content">
                <h2>🎯 Manual ID Generation</h2>
                <div class="row">
                    <div>
                        <div class="form-group">
                            <label for="manualType">Content Type:</label>
                            <select id="manualType">
                                <option value="movie">Movie</option>
                                <option value="tv">TV Series</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="tmdbId">TMDB ID:</label>
                            <input type="number" id="tmdbId" placeholder="e.g., 550 for Fight Club">
                        </div>
                    </div>
                    <div>
                        <div class="form-group">
                            <label>Source Configuration:</label>
                            <div class="checkbox-group">
                                <div class="checkbox-item">
                                    <input type="checkbox" id="manualVidsrc" checked>
                                    <label for="manualVidsrc">VidSrc Embed</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="manualDirect">
                                    <label for="manualDirect">Direct Links</label>
                                </div>
                                <div class="checkbox-item">
                                    <input type="checkbox" id="manualYoutube" checked>
                                    <label for="manualYoutube">YouTube Trailer</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <button class="btn btn-success" onclick="generateManualContent()">🎬 Generate from ID</button>
            </div>

            <div id="search" class="tab-content">
                <h2>🔍 Search & Generate</h2>
                <div class="row">
                    <div>
                        <div class="form-group">
                            <label for="searchQuery">Search Query:</label>
                            <input type="text" id="searchQuery" placeholder="e.g., The Dark Knight">
                        </div>
                        <div class="form-group">
                            <label for="searchType">Search Type:</label>
                            <select id="searchType">
                                <option value="multi">Movies & TV Shows</option>
                                <option value="movie">Movies Only</option>
                                <option value="tv">TV Shows Only</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <div class="form-group">
                            <label for="searchYear">Year (Optional):</label>
                            <input type="number" id="searchYear" placeholder="e.g., 2008" min="1900" max="2025">
                        </div>
                        <div class="form-group">
                            <label for="maxResults">Max Results:</label>
                            <input type="number" id="maxResults" value="10" min="1" max="20">
                        </div>
                    </div>
                </div>
                <button class="btn btn-warning" onclick="searchAndPreview()">🔍 Search Content</button>
                <div id="searchResults"></div>
            </div>
        </div>

        <div class="card">
            <h2>📊 Generation Progress</h2>
            <div id="progressContainer" style="display: none;">
                <div class="progress">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div id="progressText">Initializing...</div>
            </div>
            <div id="statusMessages"></div>
        </div>

        <div class="card">
            <h2>📋 Generated Content</h2>
            <div class="row">
                <div>
                    <button class="btn btn-success" onclick="downloadJson()">📥 Download JSON</button>
                    <button class="btn btn-info" onclick="copyToClipboard()">📋 Copy to Clipboard</button>
                </div>
                <div>
                    <button class="btn btn-warning" onclick="previewContent()">👁️ Preview Content</button>
                    <button class="btn btn-primary" onclick="clearResults()">🗑️ Clear Results</button>
                </div>
            </div>
            <div class="result" id="result"></div>
        </div>
    </div>

    <script>
        let generatedContent = {
            api_info: {
                version: "2.0",
                description: "CineMax API Generated Content with TMDB Integration",
                last_updated: new Date().toISOString().split('T')[0],
                total_movies: 0,
                total_series: 0,
                total_channels: 0
            },
            home: {
                slides: [],
                featuredMovies: [],
                channels: []
            },
            categories: []
        };

        let currentProgress = 0;
        let totalItems = 0;

        // API Key validation
        async function validateApiKey() {
            const apiKey = document.getElementById('tmdbApiKey').value;
            const statusEl = document.getElementById('apiKeyStatus');
            
            if (!apiKey) {
                statusEl.className = 'api-key-status invalid';
                statusEl.textContent = '❌ API key required';
                return false;
            }

            try {
                const response = await fetch(`https://api.themoviedb.org/3/configuration?api_key=${apiKey}`);
                if (response.ok) {
                    statusEl.className = 'api-key-status valid';
                    statusEl.textContent = '✅ Valid API key';
                    return true;
                } else {
                    statusEl.className = 'api-key-status invalid';
                    statusEl.textContent = '❌ Invalid API key';
                    return false;
                }
            } catch (error) {
                statusEl.className = 'api-key-status invalid';
                statusEl.textContent = '❌ Connection error';
                return false;
            }
        }

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        // Progress management
        function showProgress(total) {
            totalItems = total;
            currentProgress = 0;
            document.getElementById('progressContainer').style.display = 'block';
            updateProgress();
        }

        function updateProgress() {
            const percentage = totalItems > 0 ? (currentProgress / totalItems) * 100 : 0;
            document.getElementById('progressBar').style.width = `${percentage}%`;
            document.getElementById('progressText').textContent = `Processing ${currentProgress}/${totalItems} items...`;
        }

        function hideProgress() {
            document.getElementById('progressContainer').style.display = 'none';
        }

        function addStatus(message, type = 'info') {
            const statusEl = document.createElement('div');
            statusEl.className = `status ${type}`;
            statusEl.textContent = message;
            document.getElementById('statusMessages').appendChild(statusEl);
            statusEl.scrollIntoView({ behavior: 'smooth' });
        }

        // TMDB API functions
        async function fetchFromTMDB(endpoint) {
            const apiKey = document.getElementById('tmdbApiKey').value;
            const response = await fetch(`https://api.themoviedb.org/3${endpoint}?api_key=${apiKey}`);
            if (!response.ok) throw new Error(`TMDB API error: ${response.status}`);
            return await response.json();
        }

        async function getMovieDetails(id) {
            const [details, credits, videos] = await Promise.all([
                fetchFromTMDB(`/movie/${id}`),
                fetchFromTMDB(`/movie/${id}/credits`),
                fetchFromTMDB(`/movie/${id}/videos`)
            ]);
            return { details, credits, videos };
        }

        async function getTVDetails(id) {
            const [details, credits, videos] = await Promise.all([
                fetchFromTMDB(`/tv/${id}`),
                fetchFromTMDB(`/tv/${id}/credits`),
                fetchFromTMDB(`/tv/${id}/videos`)
            ]);
            return { details, credits, videos };
        }

        // Content generation functions
        function generateSources(id, type, includeVidsrc, includeDirect, includeYoutube, videos) {
            const sources = [];
            let sourceId = 1;

            if (includeVidsrc) {
                const vidsrcUrl = type === 'movie' 
                    ? `https://vidsrc.net/embed/movie/${id}`
                    : `https://vidsrc.net/embed/tv/${id}`;
                
                sources.push({
                    id: sourceId++,
                    type: "play",
                    title: "VidSrc 1080p",
                    quality: "1080p",
                    size: "0MB",
                    kind: "embed",
                    premium: "false",
                    external: false,
                    url: vidsrcUrl
                });
            }

            if (includeDirect) {
                sources.push({
                    id: sourceId++,
                    type: "both",
                    title: "Direct Stream",
                    quality: "720p",
                    size: "1.2GB",
                    kind: "video",
                    premium: "false",
                    external: true,
                    url: `https://example.com/stream/${type}/${id}`
                });
            }

            if (includeYoutube && videos && videos.results.length > 0) {
                const trailer = videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
                if (trailer) {
                    sources.push({
                        id: sourceId++,
                        type: "play",
                        title: "YouTube Trailer",
                        quality: "1080p",
                        size: "0MB",
                        kind: "youtube",
                        premium: "false",
                        external: true,
                        url: `https://www.youtube.com/watch?v=${trailer.key}`
                    });
                }
            }

            return sources;
        }

        function formatMovieData(movieData, includeVidsrc, includeDirect, includeYoutube) {
            const { details, credits, videos } = movieData;
            
            const actors = credits.cast.slice(0, 6).map(actor => ({
                name: actor.name,
                type: "actor",
                role: actor.character,
                image: actor.profile_path ? `https://image.tmdb.org/t/p/w200${actor.profile_path}` : ""
            }));

            if (credits.crew) {
                const director = credits.crew.find(person => person.job === 'Director');
                if (director) {
                    actors.push({
                        name: director.name,
                        type: "director",
                        role: "Director",
                        image: director.profile_path ? `https://image.tmdb.org/t/p/w200${director.profile_path}` : ""
                    });
                }
            }

            const trailer = videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');

            return {
                id: details.id,
                type: "movie",
                title: details.title,
                year: details.release_date ? details.release_date.split('-')[0] : "",
                description: details.overview,
                image: details.poster_path ? `https://image.tmdb.org/t/p/w500${details.poster_path}` : "",
                cover: details.backdrop_path ? `https://image.tmdb.org/t/p/original${details.backdrop_path}` : "",
                trailer: trailer ? {
                    id: details.id + 1000,
                    type: "video",
                    title: `${details.title} Trailer`,
                    url: `https://www.youtube.com/watch?v=${trailer.key}`
                } : null,
                sources: generateSources(details.id, 'movie', includeVidsrc, includeDirect, includeYoutube, videos),
                label: "Movie",
                sublabel: details.release_date ? details.release_date.split('-')[0] : "",
                imdb: details.vote_average ? details.vote_average.toFixed(1) : "0.0",
                downloadas: details.title.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-'),
                comment: true,
                playas: "video",
                classification: details.adult ? "R" : "PG-13",
                duration: details.runtime ? `${Math.floor(details.runtime / 60)}:${String(details.runtime % 60).padStart(2, '0')}` : "00:00",
                rating: Math.round(details.vote_average),
                created_at: new Date().toISOString().split('T')[0],
                genres: details.genres || [],
                actors: actors,
                subtitles: [],
                comments: [],
                views: Math.floor(Math.random() * 10000),
                downloads: 0,
                shares: 0
            };
        }

        function formatTVData(tvData, includeVidsrc, includeDirect, includeYoutube) {
            const { details, credits, videos } = tvData;
            
            const actors = credits.cast.slice(0, 6).map(actor => ({
                name: actor.name,
                type: "actor",
                role: actor.character,
                image: actor.profile_path ? `https://image.tmdb.org/t/p/w200${actor.profile_path}` : ""
            }));

            if (credits.crew) {
                const creator = credits.crew.find(person => person.job === 'Executive Producer');
                if (creator) {
                    actors.push({
                        name: creator.name,
                        type: "creator",
                        role: "Creator",
                        image: creator.profile_path ? `https://image.tmdb.org/t/p/w200${creator.profile_path}` : ""
                    });
                }
            }

            const trailer = videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');

            // Generate basic seasons structure
            const seasons = [];
            if (details.seasons) {
                details.seasons.forEach((season, index) => {
                    if (season.season_number > 0) {
                        seasons.push({
                            id: season.id,
                            title: season.name,
                            episodes: Array.from({ length: season.episode_count }, (_, i) => ({
                                id: (season.id * 1000) + i + 1,
                                title: `Episode ${i + 1}`,
                                sources: generateSources(details.id, 'tv', includeVidsrc, includeDirect, false, null)
                            }))
                        });
                    }
                });
            }

            return {
                id: details.id,
                type: "series",
                title: details.name,
                year: details.first_air_date ? details.first_air_date.split('-')[0] : "",
                description: details.overview,
                image: details.poster_path ? `https://image.tmdb.org/t/p/w500${details.poster_path}` : "",
                cover: details.backdrop_path ? `https://image.tmdb.org/t/p/original${details.backdrop_path}` : "",
                trailer: trailer ? {
                    id: details.id + 1000,
                    type: "video",
                    title: `${details.name} Trailer`,
                    url: `https://www.youtube.com/watch?v=${trailer.key}`
                } : null,
                sources: [],
                label: "Series",
                sublabel: `${details.number_of_seasons} Season${details.number_of_seasons !== 1 ? 's' : ''}`,
                imdb: details.vote_average ? details.vote_average.toFixed(1) : "0.0",
                downloadas: details.name.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-'),
                comment: true,
                playas: "video",
                classification: details.adult ? "R" : "PG-13",
                duration: details.episode_run_time && details.episode_run_time[0] ? `${Math.floor(details.episode_run_time[0] / 60)}:${String(details.episode_run_time[0] % 60).padStart(2, '0')}` : "00:00",
                rating: Math.round(details.vote_average),
                created_at: new Date().toISOString().split('T')[0],
                genres: details.genres || [],
                actors: actors,
                subtitles: [],
                comments: [],
                views: Math.floor(Math.random() * 10000),
                downloads: 0,
                shares: 0,
                seasons: seasons
            };
        }

        // Bulk generation
        async function generateBulkContent() {
            if (!(await validateApiKey())) {
                addStatus('❌ Please provide a valid TMDB API key', 'error');
                return;
            }

            const contentType = document.getElementById('contentType').value;
            const releaseYear = document.getElementById('releaseYear').value;
            const pageCount = parseInt(document.getElementById('pageCount').value);
            const minRating = parseFloat(document.getElementById('minRating').value);
            const includeVidsrc = document.getElementById('includeVidsrc').checked;
            const includeDirect = document.getElementById('includeDirectLinks').checked;
            const includeYoutube = document.getElementById('includeYoutube').checked;

            try {
                addStatus(`🚀 Starting bulk generation for ${contentType}s from ${releaseYear}`, 'info');
                
                let allContent = [];
                let totalProcessed = 0;
                
                showProgress(pageCount * 20); // Approximate items per page

                for (let page = 1; page <= pageCount; page++) {
                    addStatus(`📄 Processing page ${page}/${pageCount}...`, 'info');
                    
                    const endpoint = contentType === 'movie' 
                        ? `/discover/movie?primary_release_year=${releaseYear}&page=${page}&vote_average.gte=${minRating}&sort_by=vote_average.desc`
                        : `/discover/tv?first_air_date_year=${releaseYear}&page=${page}&vote_average.gte=${minRating}&sort_by=vote_average.desc`;
                    
                    const discoverData = await fetchFromTMDB(endpoint);
                    
                    for (const item of discoverData.results) {
                        try {
                            let formattedData;
                            if (contentType === 'movie') {
                                const movieData = await getMovieDetails(item.id);
                                formattedData = formatMovieData(movieData, includeVidsrc, includeDirect, includeYoutube);
                            } else {
                                const tvData = await getTVDetails(item.id);
                                formattedData = formatTVData(tvData, includeVidsrc, includeDirect, includeYoutube);
                            }
                            
                            allContent.push(formattedData);
                            currentProgress++;
                            updateProgress();
                            totalProcessed++;
                            
                            // Small delay to avoid rate limiting
                            await new Promise(resolve => setTimeout(resolve, 100));
                        } catch (error) {
                            console.error(`Error processing ${contentType} ${item.id}:`, error);
                            addStatus(`⚠️ Skipped ${item.title || item.name} due to error`, 'error');
                        }
                    }
                }

                hideProgress();
                
                // Update generated content structure
                if (contentType === 'movie') {
                    generatedContent.api_info.total_movies = allContent.length;
                    generatedContent.home.featuredMovies = allContent.slice(0, 10);
                } else {
                    generatedContent.api_info.total_series = allContent.length;
                    if (!generatedContent.series) generatedContent.series = [];
                    generatedContent.series = allContent;
                }

                // Add to slides for featured content
                generatedContent.home.slides = allContent.slice(0, 5).map((item, index) => ({
                    id: index + 1,
                    title: item.title,
                    type: item.type,
                    image: item.image,
                    url: `${item.type}s/${item.id}`,
                    poster: item
                }));

                // Create categories
                const genreMap = {};
                allContent.forEach(item => {
                    item.genres.forEach(genre => {
                        if (!genreMap[genre.name]) {
                            genreMap[genre.name] = {
                                id: genre.id,
                                title: genre.name,
                                posters: []
                            };
                        }
                        genreMap[genre.name].posters.push(item);
                    });
                });

                generatedContent.categories = Object.values(genreMap);
                
                displayResult();
                addStatus(`✅ Successfully generated ${totalProcessed} ${contentType}s!`, 'success');
                
            } catch (error) {
                hideProgress();
                addStatus(`❌ Error during bulk generation: ${error.message}`, 'error');
            }
        }

        // Manual generation
        async function generateManualContent() {
            if (!(await validateApiKey())) {
                addStatus('❌ Please provide a valid TMDB API key', 'error');
                return;
            }

            const manualType = document.getElementById('manualType').value;
            const tmdbId = document.getElementById('tmdbId').value;
            const includeVidsrc = document.getElementById('manualVidsrc').checked;
            const includeDirect = document.getElementById('manualDirect').checked;
            const includeYoutube = document.getElementById('manualYoutube').checked;

            if (!tmdbId) {
                addStatus('❌ Please provide a TMDB ID', 'error');
                return;
            }

            try {
                addStatus(`🎯 Generating content for ${manualType} ID: ${tmdbId}`, 'info');
                
                let formattedData;
                if (manualType === 'movie') {
                    const movieData = await getMovieDetails(tmdbId);
                    formattedData = formatMovieData(movieData, includeVidsrc, includeDirect, includeYoutube);
                } else {
                    const tvData = await getTVDetails(tmdbId);
                    formattedData = formatTVData(tvData, includeVidsrc, includeDirect, includeYoutube);
                }

                // Add to generated content
                if (manualType === 'movie') {
                    generatedContent.api_info.total_movies = (generatedContent.api_info.total_movies || 0) + 1;
                    if (!generatedContent.home.featuredMovies) generatedContent.home.featuredMovies = [];
                    generatedContent.home.featuredMovies.unshift(formattedData);
                } else {
                    generatedContent.api_info.total_series = (generatedContent.api_info.total_series || 0) + 1;
                    if (!generatedContent.series) generatedContent.series = [];
                    generatedContent.series.unshift(formattedData);
                }

                displayResult();
                addStatus(`✅ Successfully generated ${formattedData.title}!`, 'success');
                
            } catch (error) {
                addStatus(`❌ Error generating content: ${error.message}`, 'error');
            }
        }

        // Search and preview
        async function searchAndPreview() {
            if (!(await validateApiKey())) {
                addStatus('❌ Please provide a valid TMDB API key', 'error');
                return;
            }

            const query = document.getElementById('searchQuery').value;
            const searchType = document.getElementById('searchType').value;
            const year = document.getElementById('searchYear').value;
            const maxResults = parseInt(document.getElementById('maxResults').value);

            if (!query) {
                addStatus('❌ Please enter a search query', 'error');
                return;
            }

            try {
                addStatus(`🔍 Searching for "${query}"...`, 'info');
                
                let endpoint = `/search/${searchType}?query=${encodeURIComponent(query)}`;
                if (year) endpoint += `&year=${year}`;

                const searchData = await fetchFromTMDB(endpoint);
                const results = searchData.results.slice(0, maxResults);

                if (results.length === 0) {
                    addStatus('❌ No results found', 'error');
                    return;
                }

                displaySearchResults(results);
                addStatus(`✅ Found ${results.length} results`, 'success');
                
            } catch (error) {
                addStatus(`❌ Search error: ${error.message}`, 'error');
            }
        }

        function displaySearchResults(results) {
            const container = document.getElementById('searchResults');
            container.innerHTML = '<h3>🎬 Search Results</h3>';

            results.forEach(result => {
                const isMovie = result.title !== undefined;
                const title = isMovie ? result.title : result.name;
                const year = isMovie ? result.release_date : result.first_air_date;
                const type = isMovie ? 'movie' : 'tv';

                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <div class="movie-title">${title}</div>
                    <div class="movie-info">
                        ${type.toUpperCase()} • ${year ? year.split('-')[0] : 'Unknown'} • 
                        Rating: ${result.vote_average ? result.vote_average.toFixed(1) : 'N/A'}
                    </div>
                    <div class="source-info">TMDB ID: ${result.id}</div>
                    <button class="btn btn-primary" style="margin-top: 10px;" 
                            onclick="generateFromSearch(${result.id}, '${type}', '${title.replace("'", "\\'")}')">
                        🎬 Generate Content
                    </button>
                `;
                container.appendChild(card);
            });
        }

        async function generateFromSearch(id, type, title) {
            document.getElementById('manualType').value = type;
            document.getElementById('tmdbId').value = id;
            
            // Switch to manual tab and generate
            switchTab('manual');
            document.querySelector('[onclick="switchTab(\'manual\')"]').click();
            
            addStatus(`🎯 Generating content for ${title}...`, 'info');
            await generateManualContent();
        }

        // Display and utility functions
        function displayResult() {
            const resultEl = document.getElementById('result');
            resultEl.innerHTML = `<pre>${JSON.stringify(generatedContent, null, 2)}</pre>`;
        }

        function downloadJson() {
            if (!generatedContent.home.featuredMovies?.length && !generatedContent.series?.length) {
                addStatus('❌ No content to download', 'error');
                return;
            }

            const blob = new Blob([JSON.stringify(generatedContent, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cinemax_content_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            addStatus('✅ Content downloaded successfully', 'success');
        }

        function copyToClipboard() {
            if (!generatedContent.home.featuredMovies?.length && !generatedContent.series?.length) {
                addStatus('❌ No content to copy', 'error');
                return;
            }

            navigator.clipboard.writeText(JSON.stringify(generatedContent, null, 2))
                .then(() => addStatus('✅ Content copied to clipboard', 'success'))
                .catch(() => addStatus('❌ Failed to copy to clipboard', 'error'));
        }

        function previewContent() {
            if (!generatedContent.home.featuredMovies?.length && !generatedContent.series?.length) {
                addStatus('❌ No content to preview', 'error');
                return;
            }

            const totalMovies = generatedContent.api_info.total_movies || 0;
            const totalSeries = generatedContent.api_info.total_series || 0;
            const totalCategories = generatedContent.categories?.length || 0;

            const preview = `
📊 CONTENT SUMMARY
==================
🎬 Movies: ${totalMovies}
📺 TV Series: ${totalSeries}
🏷️ Categories: ${totalCategories}
📅 Generated: ${generatedContent.api_info.last_updated}

🎯 FEATURED CONTENT
==================
${generatedContent.home.featuredMovies?.slice(0, 5).map(movie => 
    `• ${movie.title} (${movie.year}) - ${movie.imdb}/10`
).join('\n') || 'No featured movies'}

${generatedContent.series?.slice(0, 5).map(series => 
    `• ${series.title} (${series.year}) - ${series.sublabel}`
).join('\n') || 'No series available'}
            `;

            document.getElementById('result').innerHTML = `<pre>${preview}</pre>`;
            addStatus('✅ Content preview generated', 'success');
        }

        function clearResults() {
            generatedContent = {
                api_info: {
                    version: "2.0",
                    description: "CineMax API Generated Content with TMDB Integration",
                    last_updated: new Date().toISOString().split('T')[0],
                    total_movies: 0,
                    total_series: 0,
                    total_channels: 0
                },
                home: {
                    slides: [],
                    featuredMovies: [],
                    channels: []
                },
                categories: []
            };
            
            document.getElementById('result').innerHTML = '<pre>No content generated yet. Use the tools above to generate content.</pre>';
            document.getElementById('statusMessages').innerHTML = '';
            document.getElementById('searchResults').innerHTML = '';
            
            addStatus('🗑️ Results cleared', 'info');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            clearResults();
            validateApiKey();
        });
    </script>
</body>
</html>
