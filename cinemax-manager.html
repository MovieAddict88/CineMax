<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMax Content Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #2c3e50, #4a6491);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }
        
        .tab {
            flex: 1;
            padding: 15px 20px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .tab.active {
            background: #3498db;
            color: white;
        }
        
        .tab:hover:not(.active) {
            background: #e9ecef;
        }
        
        .tab-content {
            display: none;
            padding: 30px;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3498db;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        .btn-primary {
            background: #3498db;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #2ecc71;
            color: white;
        }
        
        .btn-success:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }
        
        .btn-warning {
            background: #f39c12;
            color: white;
        }
        
        .btn-warning:hover {
            background: #e67e22;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #dee2e6;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #3498db;
        }
        
        .stat-label {
            color: #6c757d;
            font-size: 0.9rem;
        }
        
        .source-item {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .source-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .source-type {
            background: #3498db;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .source-kind {
            background: #2ecc71;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            .tabs {
                flex-direction: column;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 CineMax Content Manager</h1>
            <p class="subtitle">TMDB Integration with Automatic Source Generation</p>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="showTab('dashboard')">📊 Dashboard</button>
            <button class="tab" onclick="showTab('auto-gen')">🤖 Auto Generation</button>
            <button class="tab" onclick="showTab('manual')">✏️ Manual Input</button>
            <button class="tab" onclick="showTab('bulk')">📦 Bulk Operations</button>
            <button class="tab" onclick="showTab('content')">🎭 Content Management</button>
        </div>

        <!-- Dashboard Tab -->
        <div id="dashboard" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalMovies">0</div>
                    <div class="stat-label">Movies</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalSeries">0</div>
                    <div class="stat-label">TV Series</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalLiveTV">0</div>
                    <div class="stat-label">Live TV</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalActors">0</div>
                    <div class="stat-label">Actors</div>
                </div>
            </div>
            
            <div class="alert alert-success">
                <strong>TMDB API Status:</strong> Connected and ready for content generation
            </div>
        </div>

        <!-- Auto Generation Tab -->
        <div id="auto-gen" class="tab-content">
            <div class="form-group">
                <label>TMDB API Key:</label>
                <input type="text" id="tmdbApiKey" value="ec926176bf467b3f7735e3154238c161" placeholder="Enter TMDB API Key">
            </div>
            
            <div class="grid">
                <div class="form-group">
                    <label>Content Type:</label>
                    <select id="contentType">
                        <option value="movie">Movie</option>
                        <option value="tv">TV Series</option>
                        <option value="live">Live TV</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>TMDB ID:</label>
                    <input type="number" id="tmdbId" placeholder="Enter TMDB ID">
                </div>
            </div>
            
            <div class="form-group">
                <label>Source Providers:</label>
                <button class="btn btn-primary" onclick="addSourceProvider('vidsrc')">VidSrc.net</button>
                <button class="btn btn-primary" onclick="addSourceProvider('vidjoy')">VidJoy.pro</button>
                <button class="btn btn-primary" onclick="addSourceProvider('youtube')">YouTube Trailer</button>
                <button class="btn btn-primary" onclick="addSourceProvider('direct')">Direct Link</button>
            </div>
            
            <div id="sourceProviders"></div>
            
            <button class="btn btn-success" onclick="generateContent()">Generate Content</button>
            <button class="btn btn-warning" onclick="previewContent()">Preview</button>
            
            <div id="previewArea"></div>
        </div>

        <!-- Manual Input Tab -->
        <div id="manual" class="tab-content">
            <div class="grid">
                <div class="form-group">
                    <label>Title:</label>
                    <input type="text" id="manualTitle" placeholder="Enter title">
                </div>
                
                <div class="form-group">
                    <label>Type:</label>
                    <select id="manualType">
                        <option value="movie">Movie</option>
                        <option value="series">TV Series</option>
                        <option value="live">Live TV</option>
                    </select>
                </div>
            </div>
            
            <div class="grid">
                <div class="form-group">
                    <label>Year:</label>
                    <input type="number" id="manualYear" placeholder="Year">
                </div>
                
                <div class="form-group">
                    <label>Duration:</label>
                    <input type="text" id="manualDuration" placeholder="e.g., 2:30:00">
                </div>
            </div>
            
            <div class="form-group">
                <label>Description:</label>
                <textarea id="manualDescription" rows="4" placeholder="Enter description"></textarea>
            </div>
            
            <div class="form-group">
                <label>Poster URL:</label>
                <input type="url" id="manualPoster" placeholder="Enter poster URL">
            </div>
            
            <div class="form-group">
                <label>Sources:</label>
                <div id="manualSources"></div>
                <button class="btn btn-primary" onclick="addManualSource()">Add Source</button>
            </div>
            
            <button class="btn btn-success" onclick="saveManualContent()">Save Content</button>
            <button class="btn btn-warning" onclick="clearManualForm()">Clear Form</button>
        </div>

        <!-- Bulk Operations Tab -->
        <div id="bulk" class="tab-content">
            <div class="grid">
                <div class="form-group">
                    <label>Start Year:</label>
                    <input type="number" id="startYear" value="2020">
                </div>
                
                <div class="form-group">
                    <label>End Year:</label>
                    <input type="number" id="endYear" value="2024">
                </div>
                
                <div class="form-group">
                    <label>Pages per Year:</label>
                    <input type="number" id="pagesPerYear" value="5" min="1" max="20">
                </div>
                
                <div class="form-group">
                    <label>Content Type:</label>
                    <select id="bulkContentType">
                        <option value="movie">Movies Only</option>
                        <option value="tv">TV Series Only</option>
                        <option value="both">Both Movies & TV</option>
                    </select>
                </div>
            </div>
            
            <button class="btn btn-success" onclick="startBulkGeneration()">Start Bulk Generation</button>
            <button class="btn btn-warning" onclick="stopBulkGeneration()">Stop Generation</button>
            
            <div id="bulkProgress"></div>
        </div>

        <!-- Content Management Tab -->
        <div id="content" class="tab-content">
            <button class="btn btn-primary" onclick="loadContent()">Load Content</button>
            <button class="btn btn-success" onclick="saveContent()">Save Content</button>
            <button class="btn btn-warning" onclick="exportContent()">Export JSON</button>
            
            <div id="contentList"></div>
        </div>
    </div>

    <script>
        // Global variables
        let currentContent = [];
        let sourceProviders = [];
        let bulkGenerationActive = false;
        
        // TMDB API configuration
        const TMDB_API_KEY = 'ec926176bf467b3f7735e3154238c161';
        const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
        
        // Tab management
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Remove active class from all nav tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            
            // Add active class to clicked nav tab
            event.target.classList.add('active');
        }
        
        // Source provider management
        function addSourceProvider(type) {
            const providers = document.getElementById('sourceProviders');
            const providerDiv = document.createElement('div');
            providerDiv.className = 'source-item';
            
            let providerName = '';
            let providerUrl = '';
            
            switch(type) {
                case 'vidsrc':
                    providerName = 'VidSrc.net';
                    providerUrl = 'https://vidsrc.net/embed/';
                    break;
                case 'vidjoy':
                    providerName = 'VidJoy.pro';
                    providerUrl = 'https://vidjoy.pro/embed/';
                    break;
                case 'youtube':
                    providerName = 'YouTube Trailer';
                    providerUrl = 'https://www.youtube.com/watch?v=';
                    break;
                case 'direct':
                    providerName = 'Direct Link';
                    providerUrl = '';
                    break;
            }
            
            providerDiv.innerHTML = `
                <div class="source-header">
                    <span class="source-type">${providerName}</span>
                    <button class="btn btn-danger" onclick="removeSourceProvider(this)">Remove</button>
                </div>
                <input type="text" placeholder="Enter URL or ID" value="${providerUrl}">
            `;
            
            providers.appendChild(providerDiv);
            sourceProviders.push({ type, name: providerName, url: providerUrl });
        }
        
        function removeSourceProvider(button) {
            button.parentElement.parentElement.remove();
        }
        
        // TMDB API functions
        async function fetchTMDBData(type, id) {
            try {
                const url = `${TMDB_BASE_URL}/${type}/${id}?api_key=${TMDB_API_KEY}&append_to_response=credits,videos,images`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success === false) {
                    throw new Error(data.status_message || 'TMDB API Error');
                }
                
                return data;
            } catch (error) {
                console.error('TMDB API Error:', error);
                throw error;
            }
        }
        
        // Content generation
        async function generateContent() {
            const contentType = document.getElementById('contentType').value;
            const tmdbId = document.getElementById('tmdbId').value;
            
            if (!tmdbId) {
                showAlert('Please enter a TMDB ID', 'danger');
                return;
            }
            
            try {
                showAlert('Generating content from TMDB...', 'warning');
                
                const tmdbData = await fetchTMDBData(contentType, tmdbId);
                const content = await processTMDBData(tmdbData, contentType);
                
                // Add to current content
                currentContent.push(content);
                
                showAlert('Content generated successfully!', 'success');
                updateDashboard();
                
            } catch (error) {
                showAlert(`Error generating content: ${error.message}`, 'danger');
            }
        }
        
        async function processTMDBData(tmdbData, contentType) {
            const content = {
                id: currentContent.length + 1,
                title: tmdbData.title || tmdbData.name,
                type: contentType === 'movie' ? 'movie' : 'series',
                year: tmdbData.release_date ? tmdbData.release_date.split('-')[0] : '',
                duration: tmdbData.runtime ? `${Math.floor(tmdbData.runtime / 60)}:${(tmdbData.runtime % 60).toString().padStart(2, '0')}:00` : '',
                description: tmdbData.overview,
                image: `https://image.tmdb.org/t/p/w500${tmdbData.poster_path}`,
                cover: `https://image.tmdb.org/t/p/original${tmdbData.backdrop_path}`,
                rating: tmdbData.vote_average,
                genres: tmdbData.genres?.map((g, index) => ({ id: index + 1, title: g.name })) || [],
                actors: tmdbData.credits?.cast?.slice(0, 10).map((a, index) => ({
                    id: index + 1,
                    name: a.name,
                    type: 'actor',
                    role: a.character,
                    image: a.profile_path ? `https://image.tmdb.org/t/p/w200${a.profile_path}` : null
                })) || [],
                sources: [],
                trailer: null
            };
            
            // Generate sources based on providers
            content.sources = await generateSources(tmdbData, contentType);
            
            // Generate trailer
            if (tmdbData.videos?.results?.length > 0) {
                const trailer = tmdbData.videos.results.find(v => v.type === 'Trailer');
                if (trailer) {
                    content.trailer = {
                        id: trailer.id,
                        type: 'youtube',
                        title: `${content.title} Trailer`,
                        url: `https://www.youtube.com/watch?v=${trailer.key}`
                    };
                }
            }
            
            return content;
        }
        
        async function generateSources(tmdbData, contentType) {
            const sources = [];
            const tmdbId = tmdbData.id;
            
            // VidSrc.net source
            sources.push({
                id: 1,
                type: 'video',
                title: `${tmdbData.title || tmdbData.name} - VidSrc`,
                quality: '1080p',
                size: 'Unknown',
                kind: 'both',
                premium: 'false',
                external: false,
                url: `https://vidsrc.net/embed/${contentType}/${tmdbId}`
            });
            
            // VidJoy.pro source
            sources.push({
                id: 2,
                type: 'video',
                title: `${tmdbData.title || tmdbData.name} - VidJoy`,
                quality: '720p',
                size: 'Unknown',
                kind: 'both',
                premium: 'false',
                external: false,
                url: `https://vidjoy.pro/embed/${contentType}/${tmdbId}`
            });
            
            return sources;
        }
        
        // Manual content functions
        function addManualSource() {
            const sourcesDiv = document.getElementById('manualSources');
            const sourceDiv = document.createElement('div');
            sourceDiv.className = 'source-item';
            
            sourceDiv.innerHTML = `
                <div class="source-header">
                    <span class="source-type">Manual Source</span>
                    <button class="btn btn-danger" onclick="removeManualSource(this)">Remove</button>
                </div>
                <div class="grid">
                    <input type="text" placeholder="Title" name="sourceTitle">
                    <select name="sourceType">
                        <option value="video">Video</option>
                        <option value="embed">Embed</option>
                        <option value="youtube">YouTube</option>
                    </select>
                </div>
                <div class="grid">
                    <select name="sourceKind">
                        <option value="both">Both (Play/Download)</option>
                        <option value="play">Play Only</option>
                        <option value="download">Download Only</option>
                    </select>
                    <input type="text" placeholder="Quality (e.g., 1080p)" name="sourceQuality">
                </div>
                <input type="url" placeholder="URL" name="sourceUrl">
            `;
            
            sourcesDiv.appendChild(sourceDiv);
        }
        
        function removeManualSource(button) {
            button.parentElement.parentElement.remove();
        }
        
        function saveManualContent() {
            const content = {
                id: currentContent.length + 1,
                title: document.getElementById('manualTitle').value,
                type: document.getElementById('manualType').value,
                year: document.getElementById('manualYear').value,
                duration: document.getElementById('manualDuration').value,
                description: document.getElementById('manualDescription').value,
                image: document.getElementById('manualPoster').value,
                sources: []
            };
            
            // Get sources from form
            const sourceItems = document.querySelectorAll('#manualSources .source-item');
            sourceItems.forEach((item, index) => {
                const source = {
                    id: index + 1,
                    type: item.querySelector('[name="sourceType"]').value,
                    title: item.querySelector('[name="sourceTitle"]').value,
                    quality: item.querySelector('[name="sourceQuality"]').value,
                    kind: item.querySelector('[name="sourceKind"]').value,
                    url: item.querySelector('[name="sourceUrl"]').value
                };
                content.sources.push(source);
            });
            
            currentContent.push(content);
            showAlert('Manual content saved successfully!', 'success');
            updateDashboard();
            clearManualForm();
        }
        
        function clearManualForm() {
            document.getElementById('manualTitle').value = '';
            document.getElementById('manualYear').value = '';
            document.getElementById('manualDuration').value = '';
            document.getElementById('manualDescription').value = '';
            document.getElementById('manualPoster').value = '';
            document.getElementById('manualSources').innerHTML = '';
        }
        
        // Bulk generation
        async function startBulkGeneration() {
            const startYear = parseInt(document.getElementById('startYear').value);
            const endYear = parseInt(document.getElementById('endYear').value);
            const pagesPerYear = parseInt(document.getElementById('pagesPerYear').value);
            const contentType = document.getElementById('bulkContentType').value;
            
            bulkGenerationActive = true;
            showAlert('Bulk generation started...', 'warning');
            
            for (let year = startYear; year <= endYear && bulkGenerationActive; year++) {
                for (let page = 1; page <= pagesPerYear && bulkGenerationActive; page++) {
                    try {
                        await generateBulkContent(year, page, contentType);
                        updateBulkProgress(year, page, endYear, pagesPerYear);
                    } catch (error) {
                        console.error(`Error generating content for year ${year}, page ${page}:`, error);
                    }
                }
            }
            
            if (bulkGenerationActive) {
                showAlert('Bulk generation completed!', 'success');
            } else {
                showAlert('Bulk generation stopped.', 'warning');
            }
            
            bulkGenerationActive = false;
        }
        
        async function generateBulkContent(year, page, contentType) {
            const url = `${TMDB_BASE_URL}/discover/${contentType === 'tv' ? 'tv' : 'movie'}?api_key=${TMDB_API_KEY}&year=${year}&page=${page}`;
            const response = await fetch(url);
            const data = await response.json();
            
            for (const item of data.results) {
                try {
                    const fullData = await fetchTMDBData(contentType === 'tv' ? 'tv' : 'movie', item.id);
                    const content = await processTMDBData(fullData, contentType === 'tv' ? 'tv' : 'movie');
                    
                    // Check for duplicates
                    const isDuplicate = currentContent.some(existing => 
                        existing.title === content.title && existing.year === content.year
                    );
                    
                    if (!isDuplicate) {
                        currentContent.push(content);
                    }
                } catch (error) {
                    console.error(`Error processing item ${item.id}:`, error);
                }
            }
        }
        
        function stopBulkGeneration() {
            bulkGenerationActive = false;
            showAlert('Stopping bulk generation...', 'warning');
        }
        
        function updateBulkProgress(currentYear, currentPage, endYear, pagesPerYear) {
            const progressDiv = document.getElementById('bulkProgress');
            const totalYears = endYear - parseInt(document.getElementById('startYear').value) + 1;
            const totalPages = totalYears * pagesPerYear;
            const currentProgress = ((currentYear - parseInt(document.getElementById('startYear').value)) * pagesPerYear + currentPage) / totalPages * 100;
            
            progressDiv.innerHTML = `
                <div class="alert alert-warning">
                    <strong>Progress:</strong> ${currentProgress.toFixed(1)}% - Year: ${currentYear}, Page: ${currentPage}
                </div>
            `;
        }
        
        // Utility functions
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            
            // Remove existing alerts
            document.querySelectorAll('.alert').forEach(alert => alert.remove());
            
            // Add new alert
            document.querySelector('.container').insertBefore(alertDiv, document.querySelector('.tabs'));
            
            // Auto remove after 5 seconds
            setTimeout(() => alertDiv.remove(), 5000);
        }
        
        function updateDashboard() {
            const movies = currentContent.filter(c => c.type === 'movie').length;
            const series = currentContent.filter(c => c.type === 'series').length;
            const liveTV = currentContent.filter(c => c.type === 'live').length;
            const actors = new Set(currentContent.flatMap(c => c.actors?.map(a => a.id) || [])).size;
            
            document.getElementById('totalMovies').textContent = movies;
            document.getElementById('totalSeries').textContent = series;
            document.getElementById('totalLiveTV').textContent = liveTV;
            document.getElementById('totalActors').textContent = actors;
        }
        
        function saveContent() {
            // Create proper structure matching free_movie_api.json
            const movies = currentContent.filter(c => c.type === 'movie');
            const series = currentContent.filter(c => c.type === 'series');
            const liveTV = currentContent.filter(c => c.type === 'live');
            
            // Get unique actors and genres
            const allActors = [...new Set(currentContent.flatMap(c => c.actors || []))];
            const allGenres = [...new Set(currentContent.flatMap(c => c.genres || []))];
            
            // Create slides for home section
            const slides = movies.map((movie, index) => ({
                id: index + 1,
                title: movie.title,
                type: movie.type,
                image: movie.image,
                url: `movies/${index + 1}`,
                poster: {
                    ...movie,
                    id: index + 1,
                    label: "Latest Movie",
                    sublabel: `Released ${movie.year}`,
                    imdb: movie.rating ? movie.rating.toString() : "8.5",
                    downloadas: `${movie.title.toLowerCase().replace(/[^a-z0-9]/g, '-')}.mp4`,
                    comment: true,
                    playas: "video",
                    classification: "PG-13",
                    sources: movie.sources.map((source, sourceIndex) => ({
                        ...source,
                        id: sourceIndex + 1
                    })),
                    trailer: movie.trailer ? {
                        ...movie.trailer,
                        id: movie.sources.length + 1
                    } : null,
                    actors: movie.actors.map((actor, actorIndex) => ({
                        ...actor,
                        id: actorIndex + 1
                    })),
                    subtitles: [
                        {
                            id: 1,
                            title: "English",
                            language: "en",
                            url: `https://example.com/subtitles/${movie.title.toLowerCase().replace(/[^a-z0-9]/g, '-')}-en.vtt`
                        }
                    ]
                }
            }));
            
            const data = {
                api_info: {
                    version: "2.0",
                    description: "Enhanced Free Movie & TV Streaming JSON API with Full Actor Support",
                    last_updated: new Date().toISOString().split('T')[0],
                    total_movies: movies.length,
                    total_channels: liveTV.length,
                    total_actors: allActors.length
                },
                home: {
                    slides: slides,
                    featured_movies: slides,
                    channels: liveTV.map((channel, index) => ({
                        ...channel,
                        id: index + 1
                    })),
                    actors: allActors.map((actor, index) => ({
                        ...actor,
                        id: index + 1
                    })),
                    genres: allGenres.map((genre, index) => ({
                        ...genre,
                        id: index + 1
                    }))
                },
                movies: movies.map((movie, index) => ({
                    ...movie,
                    id: index + 1
                })),
                channels: liveTV.map((channel, index) => ({
                    ...channel,
                    id: index + 1
                })),
                actors: allActors.map((actor, index) => ({
                    ...actor,
                    id: index + 1
                })),
                genres: allGenres.map((genre, index) => ({
                    ...genre,
                    id: index + 1
                }))
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'cinemax_content.json';
            a.click();
            URL.revokeObjectURL(url);
            
            showAlert('Content saved successfully!', 'success');
        }
        
        function previewContent() {
            const previewArea = document.getElementById('previewArea');
            if (currentContent.length === 0) {
                previewArea.innerHTML = '<div class="alert alert-warning">No content to preview</div>';
                return;
            }
            
            const latestContent = currentContent[currentContent.length - 1];
            previewArea.innerHTML = `
                <div class="alert alert-success">
                    <h3>Preview: ${latestContent.title}</h3>
                    <p><strong>Type:</strong> ${latestContent.type}</p>
                    <p><strong>Year:</strong> ${latestContent.year}</p>
                    <p><strong>Description:</strong> ${latestContent.description}</p>
                    <p><strong>Sources:</strong> ${latestContent.sources.length}</p>
                    <p><strong>Actors:</strong> ${latestContent.actors.length}</p>
                </div>
            `;
        }
        
        function loadContent() {
            showAlert('Load content functionality - implement file upload', 'warning');
        }
        
        function exportContent() {
            showAlert('Export content functionality - implement export options', 'warning');
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateDashboard();
        });
    </script>
</body>
</html>
