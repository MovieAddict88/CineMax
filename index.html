<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMax Enhanced API Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #3498db;
            --success: #2ecc71;
            --warning: #f39c12;
            --danger: #e74c3c;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --gray: #95a5a6;
            --purple: #9b59b6;
            --orange: #e67e22;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, var(--primary), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.3rem;
            color: var(--gray);
            max-width: 800px;
            margin: 0 auto;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
        }
        
        .stat-label {
            color: var(--gray);
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }
        
        .card h2 {
            color: var(--dark);
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid var(--primary);
            display: flex;
            align-items: center;
            font-size: 1.8rem;
        }
        
        .card h2 i {
            margin-right: 15px;
            font-size: 2rem;
            color: var(--primary);
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            background: var(--light);
            color: var(--dark);
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .tab-btn.active {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
        }
        
        input, select, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }
        
        textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn-success {
            background: var(--success);
        }
        
        .btn-success:hover {
            background: #27ae60;
        }
        
        .btn-warning {
            background: var(--warning);
        }
        
        .btn-warning:hover {
            background: #e67e22;
        }
        
        .btn-danger {
            background: var(--danger);
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .btn-purple {
            background: var(--purple);
        }
        
        .btn-purple:hover {
            background: #8e44ad;
        }
        
        .bulk-section {
            background: rgba(255, 255, 255, 0.8);
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        
        .bulk-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .notification.success {
            background: var(--success);
        }
        
        .notification.error {
            background: var(--danger);
        }
        
        .notification.warning {
            background: var(--warning);
        }
        
        .source-type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .source-type-btn {
            padding: 8px 15px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .source-type-btn.active {
            background: var(--primary);
            color: white;
        }
        
        .video-preview {
            width: 100%;
            max-width: 400px;
            height: 225px;
            border-radius: 10px;
            margin: 15px 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }
        
        .result-item {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .result-item:hover {
            transform: translateY(-3px);
        }
        
        .result-poster {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .result-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--dark);
        }
        
        .result-year {
            color: var(--gray);
            font-size: 0.9rem;
        }
        
        .result-rating {
            color: var(--warning);
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .bulk-grid {
                grid-template-columns: 1fr;
            }
            
            .tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-film"></i> CineMax Enhanced API Manager</h1>
            <p class="subtitle">Advanced content generation with TMDB integration, bulk operations, and intelligent video source management</p>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalMovies">0</div>
                    <div class="stat-label">Movies</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalSeries">0</div>
                    <div class="stat-label">TV Series</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalActors">0</div>
                    <div class="stat-label">Actors</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalGenres">0</div>
                    <div class="stat-label">Genres</div>
                </div>
            </div>
        </header>

        <div class="card">
            <h2><i class="fas fa-cogs"></i> API Configuration</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="tmdbApiKey">TMDB API Key</label>
                    <input type="text" id="tmdbApiKey" value="ec926176bf467b3f7735e3154238c161" placeholder="Enter TMDB API Key">
                </div>
                <div class="form-group">
                    <label for="apiVersion">API Version</label>
                    <input type="text" id="apiVersion" value="2.0" placeholder="API Version">
                </div>
                <div class="form-group">
                    <label for="apiDescription">API Description</label>
                    <input type="text" id="apiDescription" value="Enhanced CineMax API with TMDB Integration" placeholder="API Description">
                </div>
            </div>
        </div>

        <div class="card">
            <h2><i class="fas fa-magic"></i> Content Generation</h2>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('single')">Single Generation</button>
                <button class="tab-btn" onclick="showTab('bulk')">Bulk Generation</button>
                <button class="tab-btn" onclick="showTab('manual')">Manual Entry</button>
            </div>

            <!-- Single Generation Tab -->
            <div id="single" class="tab-content active">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="contentType">Content Type</label>
                        <select id="contentType">
                            <option value="movie">Movie</option>
                            <option value="series">TV Series</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="tmdbId">TMDB ID</label>
                        <input type="text" id="tmdbId" placeholder="Enter TMDB ID">
                    </div>
                    <div class="form-group">
                        <label for="videoSourceType">Video Source Type</label>
                        <select id="videoSourceType">
                            <option value="embed">Embedded (vidsrc.net)</option>
                            <option value="youtube">YouTube</option>
                            <option value="direct">Direct Link</option>
                        </select>
                    </div>
                </div>
                
                <div class="source-type-selector">
                    <button class="source-type-btn active" data-type="play">Play Only</button>
                    <button class="source-type-btn" data-type="both">Download & Play</button>
                </div>
                
                <button class="btn btn-success" onclick="generateSingleContent()">
                    <i class="fas fa-plus"></i> Generate Content
                </button>
            </div>

            <!-- Bulk Generation Tab -->
            <div id="bulk" class="tab-content">
                <div class="bulk-section">
                    <h3><i class="fas fa-database"></i> Bulk Generation Settings</h3>
                    <div class="bulk-grid">
                        <div class="form-group">
                            <label for="bulkYear">Year</label>
                            <input type="number" id="bulkYear" value="2024" min="1900" max="2030">
                        </div>
                        <div class="form-group">
                            <label for="bulkPages">Number of Pages</label>
                            <input type="number" id="bulkPages" value="1" min="1" max="50">
                        </div>
                        <div class="form-group">
                            <label for="bulkType">Content Type</label>
                            <select id="bulkType">
                                <option value="movie">Movies Only</option>
                                <option value="series">TV Series Only</option>
                                <option value="both">Both</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="bulkMinRating">Minimum Rating</label>
                            <input type="number" id="bulkMinRating" value="6.0" min="0" max="10" step="0.1">
                        </div>
                    </div>
                    
                    <div class="progress-bar">
                        <div class="progress-fill" id="bulkProgress"></div>
                    </div>
                    
                    <button class="btn btn-purple" onclick="startBulkGeneration()">
                        <i class="fas fa-rocket"></i> Start Bulk Generation
                    </button>
                </div>
            </div>

            <!-- Manual Entry Tab -->
            <div id="manual" class="tab-content">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="manualTitle">Title</label>
                        <input type="text" id="manualTitle" placeholder="Enter title">
                    </div>
                    <div class="form-group">
                        <label for="manualYear">Year</label>
                        <input type="number" id="manualYear" placeholder="Enter year">
                    </div>
                    <div class="form-group">
                        <label for="manualDescription">Description</label>
                        <textarea id="manualDescription" placeholder="Enter description"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="manualImage">Poster Image URL</label>
                        <input type="url" id="manualImage" placeholder="Enter image URL">
                    </div>
                    <div class="form-group">
                        <label for="manualCover">Cover Image URL</label>
                        <input type="url" id="manualCover" placeholder="Enter cover URL">
                    </div>
                    <div class="form-group">
                        <label for="manualVideoUrl">Video URL</label>
                        <input type="url" id="manualVideoUrl" placeholder="Enter video URL">
                    </div>
                </div>
                
                <button class="btn btn-warning" onclick="addManualContent()">
                    <i class="fas fa-plus"></i> Add Manual Content
                </button>
            </div>
        </div>

        <div class="card">
            <h2><i class="fas fa-list"></i> Generated Content</h2>
            <div class="results-grid" id="resultsGrid">
                <!-- Results will be populated here -->
            </div>
        </div>

        <div class="card">
            <h2><i class="fas fa-download"></i> Export & Download</h2>
            <div class="form-grid">
                <button class="btn btn-success" onclick="exportAPI()">
                    <i class="fas fa-download"></i> Export CineMax API
                </button>
                <button class="btn btn-warning" onclick="validateAPI()">
                    <i class="fas fa-check-circle"></i> Validate API
                </button>
                <button class="btn btn-danger" onclick="clearData()">
                    <i class="fas fa-trash"></i> Clear All Data
                </button>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        // Global variables
        let apiData = {
            api_info: {
                version: "2.0",
                description: "Enhanced CineMax API with TMDB Integration",
                last_updated: new Date().toISOString().split('T')[0],
                total_movies: 0,
                total_series: 0,
                total_actors: 0,
                total_genres: 0
            },
            movies: [],
            series: [],
            actors: [],
            genres: [],
            home: {
                slides: [],
                featured_movies: [],
                channels: []
            }
        };

        const TMDB_API_KEY = 'ec926176bf467b3f7735e3154238c161';
        const TMDB_BASE_URL = 'https://api.themoviedb.org/3';
        const IMAGE_BASE_URL = 'https://image.tmdb.org/t/p';

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            loadFromLocalStorage();
            updateStats();
            setupEventListeners();
        });

        function setupEventListeners() {
            // Source type buttons
            document.querySelectorAll('.source-type-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.source-type-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            // Auto-save every 30 seconds
            setInterval(saveToLocalStorage, 30000);
        }

        function showTab(tabName) {
            // Hide all tab contents
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            // Remove active class from all tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab content
            document.getElementById(tabName).classList.add('active');
            
            // Add active class to clicked button
            event.target.classList.add('active');
        }

        async function generateSingleContent() {
            try {
                const tmdbId = document.getElementById('tmdbId')?.value?.trim();
                const contentType = document.getElementById('contentType')?.value || 'movie';
                const videoSourceType = document.getElementById('videoSourceType')?.value || 'embed';
                const sourceTypeBtn = document.querySelector('.source-type-btn.active');
                const sourceType = sourceTypeBtn ? sourceTypeBtn.dataset.type : 'both';

                if (!tmdbId) {
                    showNotification('Please enter a TMDB ID', 'error');
                    return;
                }

                showNotification('Fetching content from TMDB...', 'warning');
                
                let contentData;
                if (contentType === 'movie') {
                    contentData = await fetchTMDBMovie(tmdbId);
                } else {
                    contentData = await fetchTMDBSeries(tmdbId);
                }

                // Generate video sources based on type
                const sources = generateVideoSources(tmdbId, contentType, videoSourceType, sourceType);
                
                // Create CineMax content object
                const cineMaxContent = createCineMaxContent(contentData, contentType, sources);
                
                // Add to appropriate array
                if (contentType === 'movie') {
                    apiData.movies.push(cineMaxContent);
                } else {
                    apiData.series.push(cineMaxContent);
                }

                // Update home slides
                updateHomeSlides(cineMaxContent);
                
                // Save and update UI
                saveToLocalStorage();
                updateStats();
                renderResults();
                
                showNotification(`✅ ${contentType} "${contentData.title || contentData.name}" generated successfully!`, 'success');
                
            } catch (error) {
                console.error('Error generating single content:', error);
                showNotification(`Error: ${error.message}`, 'error');
            }
        }

        async function fetchTMDBMovie(tmdbId) {
            try {
                const response = await fetch(`${TMDB_BASE_URL}/movie/${tmdbId}?api_key=${TMDB_API_KEY}&append_to_response=credits,videos`);
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(`Failed to fetch movie data: ${response.status} ${response.statusText} - ${errorData.status_message || 'Unknown error'}`);
                }
                return await response.json();
            } catch (error) {
                console.error(`Error fetching movie ${tmdbId}:`, error);
                throw error;
            }
        }

        async function fetchTMDBSeries(tmdbId) {
            try {
                const response = await fetch(`${TMDB_BASE_URL}/tv/${tmdbId}?api_key=${TMDB_API_KEY}&append_to_response=credits,videos`);
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(`Failed to fetch series data: ${response.status} ${response.statusText} - ${errorData.status_message || 'Unknown error'}`);
                }
                return await response.json();
            } catch (error) {
                console.error(`Error fetching series ${tmdbId}:`, error);
                throw error;
            }
        }

        function generateVideoSources(tmdbId, contentType, videoSourceType, sourceType) {
            const sources = [];
            const kind = sourceType === 'play' ? 'play' : 'both';
            
            switch (videoSourceType) {
                case 'embed':
                    const vidsrcUrl = contentType === 'movie' 
                        ? `https://vidsrc.net/embed/movie/${tmdbId}`
                        : `https://vidsrc.net/embed/tv/${tmdbId}`;
                    
                    sources.push({
                        id: generateId(),
                        type: 'video',
                        title: 'vidsrc.net 1080p',
                        quality: '1080p',
                        size: '0MB',
                        kind: kind,
                        premium: 'false',
                        external: false,
                        url: vidsrcUrl
                    });
                    break;
                    
                case 'youtube':
                    sources.push({
                        id: generateId(),
                        type: 'youtube',
                        title: 'YouTube HD',
                        quality: '1080p',
                        size: '0MB',
                        kind: kind,
                        premium: 'false',
                        external: true,
                        url: `https://www.youtube.com/watch?v=${tmdbId}`
                    });
                    break;
                    
                case 'direct':
                    sources.push({
                        id: generateId(),
                        type: 'video',
                        title: 'Direct Link 1080p',
                        quality: '1080p',
                        size: '0MB',
                        kind: kind,
                        premium: 'false',
                        external: false,
                        url: `https://example.com/video/${tmdbId}.mp4`
                    });
                    break;
            }
            
            return sources;
        }

        function createCineMaxContent(tmdbData, contentType, sources) {
            const isMovie = contentType === 'movie';
            const title = isMovie ? tmdbData.title : tmdbData.name;
            const year = isMovie 
                ? tmdbData.release_date?.split('-')[0] 
                : tmdbData.first_air_date?.split('-')[0];
            
            const content = {
                id: generateId(),
                type: contentType,
                title: title,
                year: year || 'N/A',
                description: tmdbData.overview || '',
                image: tmdbData.poster_path ? `${IMAGE_BASE_URL}/w500${tmdbData.poster_path}` : '',
                cover: tmdbData.backdrop_path ? `${IMAGE_BASE_URL}/original${tmdbData.backdrop_path}` : '',
                sources: sources,
                label: isMovie ? 'Movie' : 'Series',
                sublabel: year || 'N/A',
                imdb: tmdbData.vote_average?.toString() || '0.0',
                downloadas: title.toLowerCase().replace(/[^a-z0-9]/g, '-'),
                comment: true,
                playas: 'video',
                classification: tmdbData.adult ? 'R' : 'PG-13',
                duration: isMovie && tmdbData.runtime 
                    ? `${Math.floor(tmdbData.runtime / 60)}:${(tmdbData.runtime % 60).toString().padStart(2, '0')}`
                    : '00:00',
                rating: tmdbData.vote_average || 0,
                created_at: new Date().toISOString().split('T')[0],
                genres: tmdbData.genres || [],
                actors: extractActors(tmdbData.credits),
                subtitles: [],
                comments: [],
                views: 0,
                downloads: 0,
                shares: 0
            };

            // Add seasons for series
            if (!isMovie && tmdbData.seasons) {
                content.seasons = tmdbData.seasons.map(season => ({
                    id: generateId(),
                    title: `Season ${season.season_number}`,
                    episodes: Array.from({length: season.episode_count || 1}, (_, i) => ({
                        id: generateId(),
                        title: `Episode ${i + 1}`,
                        episode_number: i + 1,
                        image: '',
                        duration: '45:00',
                        views: 0,
                        downloads: 0,
                        sources: [{
                            id: generateId(),
                            type: 'video',
                            title: `Episode ${i + 1} 1080p`,
                            quality: '1080p',
                            url: `https://vidsrc.net/embed/tv/${tmdbData.id}/${season.season_number}/${i + 1}`
                        }],
                        subtitles: []
                    }))
                }));
            }

            return content;
        }

        function extractActors(credits) {
            const actors = [];
            
            if (credits?.cast) {
                credits.cast.slice(0, 5).forEach(actor => {
                    actors.push({
                        id: generateId(),
                        name: actor.name,
                        type: 'actor',
                        role: actor.character || 'Actor',
                        image: actor.profile_path ? `${IMAGE_BASE_URL}/w200${actor.profile_path}` : '',
                        born: '',
                        height: '',
                        bio: ''
                    });
                });
            }

            if (credits?.crew) {
                const director = credits.crew.find(person => person.job === 'Director');
                if (director) {
                    actors.push({
                        id: generateId(),
                        name: director.name,
                        type: 'director',
                        role: 'Director',
                        image: director.profile_path ? `${IMAGE_BASE_URL}/w200${director.profile_path}` : '',
                        born: '',
                        height: '',
                        bio: ''
                    });
                }
            }

            return actors;
        }

        async function startBulkGeneration() {
            const year = document.getElementById('bulkYear').value;
            const pages = parseInt(document.getElementById('bulkPages').value);
            const type = document.getElementById('bulkType').value;
            const minRating = parseFloat(document.getElementById('bulkMinRating').value);

            if (!year || !pages) {
                showNotification('Please fill in all bulk generation fields', 'error');
                return;
            }

            try {
                showNotification('Starting bulk generation...', 'warning');
                
                let totalItems = 0;
                let processedItems = 0;

                // Calculate total items
                for (let page = 1; page <= pages; page++) {
                    if (type === 'movie' || type === 'both') {
                        try {
                            const moviesResponse = await fetch(`${TMDB_BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&year=${year}&page=${page}&vote_average.gte=${minRating}`);
                            if (moviesResponse.ok) {
                                const moviesData = await moviesResponse.json();
                                totalItems += moviesData.results ? moviesData.results.length : 0;
                            }
                        } catch (error) {
                            console.error(`Error fetching movies page ${page}:`, error);
                        }
                    }
                    
                    if (type === 'series' || type === 'both') {
                        try {
                            const seriesResponse = await fetch(`${TMDB_BASE_URL}/discover/tv?api_key=${TMDB_API_KEY}&first_air_date_year=${year}&page=${page}&vote_average.gte=${minRating}`);
                            if (seriesResponse.ok) {
                                const seriesData = await seriesResponse.json();
                                totalItems += seriesData.results ? seriesData.results.length : 0;
                            }
                        } catch (error) {
                            console.error(`Error fetching series page ${page}:`, error);
                        }
                    }
                }

                if (totalItems === 0) {
                    showNotification('No content found for the specified criteria', 'warning');
                    return;
                }

                // Process items
                for (let page = 1; page <= pages; page++) {
                    if (type === 'movie' || type === 'both') {
                        try {
                            const moviesResponse = await fetch(`${TMDB_BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&year=${year}&page=${page}&vote_average.gte=${minRating}`);
                            if (moviesResponse.ok) {
                                const moviesData = await moviesResponse.json();
                                
                                if (moviesData.results) {
                                    for (const movie of moviesData.results) {
                                        try {
                                            const fullMovieData = await fetchTMDBMovie(movie.id);
                                            const sources = generateVideoSources(movie.id, 'movie', 'embed', 'both');
                                            const cineMaxMovie = createCineMaxContent(fullMovieData, 'movie', sources);
                                            apiData.movies.push(cineMaxMovie);
                                            
                                            processedItems++;
                                            updateBulkProgress(processedItems, totalItems);
                                        } catch (error) {
                                            console.error(`Error processing movie ${movie.id}:`, error);
                                        }
                                    }
                                }
                            }
                        } catch (error) {
                            console.error(`Error processing movies page ${page}:`, error);
                        }
                    }
                    
                    if (type === 'series' || type === 'both') {
                        try {
                            const seriesResponse = await fetch(`${TMDB_BASE_URL}/discover/tv?api_key=${TMDB_API_KEY}&first_air_date_year=${year}&page=${page}&vote_average.gte=${minRating}`);
                            if (seriesResponse.ok) {
                                const seriesData = await seriesResponse.json();
                                
                                if (seriesData.results) {
                                    for (const series of seriesData.results) {
                                        try {
                                            const fullSeriesData = await fetchTMDBSeries(series.id);
                                            const sources = generateVideoSources(series.id, 'series', 'embed', 'both');
                                            const cineMaxSeries = createCineMaxContent(fullSeriesData, 'series', sources);
                                            apiData.series.push(cineMaxSeries);
                                            
                                            processedItems++;
                                            updateBulkProgress(processedItems, totalItems);
                                        } catch (error) {
                                            console.error(`Error processing series ${series.id}:`, error);
                                        }
                                    }
                                }
                            }
                        } catch (error) {
                            console.error(`Error processing series page ${page}:`, error);
                        }
                    }
                }

                saveToLocalStorage();
                updateStats();
                renderResults();
                
                showNotification(`✅ Bulk generation completed! Added ${processedItems} items.`, 'success');
                
            } catch (error) {
                showNotification(`Bulk generation error: ${error.message}`, 'error');
            }
        }

        function updateBulkProgress(current, total) {
            const progress = (current / total) * 100;
            document.getElementById('bulkProgress').style.width = `${progress}%`;
        }

        function addManualContent() {
            try {
                const title = document.getElementById('manualTitle')?.value?.trim() || '';
                const year = document.getElementById('manualYear')?.value || '';
                const description = document.getElementById('manualDescription')?.value?.trim() || '';
                const image = document.getElementById('manualImage')?.value?.trim() || '';
                const cover = document.getElementById('manualCover')?.value?.trim() || '';
                const videoUrl = document.getElementById('manualVideoUrl')?.value?.trim() || '';

                if (!title || !year) {
                    showNotification('Please fill in title and year', 'error');
                    return;
                }

                const manualContent = {
                    id: generateId(),
                    type: 'movie',
                    title: title,
                    year: year,
                    description: description,
                    image: image,
                    cover: cover || image,
                    sources: [{
                        id: generateId(),
                        type: 'video',
                        title: 'Manual Source',
                        quality: '1080p',
                        size: '0MB',
                        kind: 'both',
                        premium: 'false',
                        external: false,
                        url: videoUrl
                    }],
                    label: 'Movie',
                    sublabel: year,
                    imdb: '0.0',
                    downloadas: title.toLowerCase().replace(/[^a-z0-9]/g, '-'),
                    comment: true,
                    playas: 'video',
                    classification: 'PG-13',
                    duration: '00:00',
                    rating: 0,
                    created_at: new Date().toISOString().split('T')[0],
                    genres: [],
                    actors: [],
                    subtitles: [],
                    comments: [],
                    views: 0,
                    downloads: 0,
                    shares: 0
                };

                apiData.movies.push(manualContent);
                updateHomeSlides(manualContent);
                
                saveToLocalStorage();
                updateStats();
                renderResults();
                
                // Clear form
                const formElements = ['manualTitle', 'manualYear', 'manualDescription', 'manualImage', 'manualCover', 'manualVideoUrl'];
                formElements.forEach(elementId => {
                    const element = document.getElementById(elementId);
                    if (element) {
                        element.value = '';
                    }
                });
                
                showNotification(`✅ Manual content "${title}" added successfully!`, 'success');
            } catch (error) {
                console.error('Error adding manual content:', error);
                showNotification(`Error adding manual content: ${error.message}`, 'error');
            }
        }

        function updateHomeSlides(content) {
            const slide = {
                id: content.id,
                title: content.title,
                type: content.type,
                image: content.cover || content.image,
                url: `${content.type}s/${content.id}`,
                poster: content
            };
            
            apiData.home.slides.push(slide);
            
            // Keep only top 10 slides
            if (apiData.home.slides.length > 10) {
                apiData.home.slides = apiData.home.slides.slice(-10);
            }
        }

        function renderResults() {
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';
            
            const allContent = [...apiData.movies, ...apiData.series];
            
            allContent.forEach(item => {
                const resultItem = document.createElement('div');
                resultItem.className = 'result-item';
                resultItem.innerHTML = `
                    <img src="${item.image}" alt="${item.title}" class="result-poster" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                    <div class="result-title">${item.title}</div>
                    <div class="result-year">${item.year}</div>
                    <div class="result-rating">⭐ ${item.rating}/10</div>
                `;
                grid.appendChild(resultItem);
            });
        }

        function updateStats() {
            document.getElementById('totalMovies').textContent = apiData.movies.length;
            document.getElementById('totalSeries').textContent = apiData.series.length;
            document.getElementById('totalActors').textContent = apiData.actors.length;
            document.getElementById('totalGenres').textContent = apiData.genres.length;
            
            // Update API info
            apiData.api_info.total_movies = apiData.movies.length;
            apiData.api_info.total_series = apiData.series.length;
            apiData.api_info.total_actors = apiData.actors.length;
            apiData.api_info.total_genres = apiData.genres.length;
            apiData.api_info.last_updated = new Date().toISOString().split('T')[0];
        }

        function exportAPI() {
            const exportData = {
                api_info: apiData.api_info,
                home: apiData.home,
                movies: apiData.movies,
                series: apiData.series,
                actors: apiData.actors,
                genres: apiData.genres
            };
            
            const jsonString = JSON.stringify(exportData, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'cinemax_api.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showNotification('✅ CineMax API exported successfully!', 'success');
        }

        function validateAPI() {
            const errors = [];
            const warnings = [];
            
            if (!apiData.api_info) errors.push('Missing API info');
            if (!apiData.movies && !apiData.series) warnings.push('No content available');
            
            if (apiData.movies) {
                apiData.movies.forEach((movie, index) => {
                    if (!movie.title) errors.push(`Movie ${index + 1}: Missing title`);
                    if (!movie.sources || movie.sources.length === 0) warnings.push(`Movie "${movie.title}": No sources`);
                });
            }
            
            if (apiData.series) {
                apiData.series.forEach((series, index) => {
                    if (!series.title) errors.push(`Series ${index + 1}: Missing title`);
                    if (!series.seasons || series.seasons.length === 0) warnings.push(`Series "${series.title}": No seasons`);
                });
            }
            
            let message = '';
            if (errors.length > 0) {
                message += `❌ ${errors.length} Error(s): ${errors.join(', ')}`;
            }
            if (warnings.length > 0) {
                message += `⚠️ ${warnings.length} Warning(s): ${warnings.join(', ')}`;
            }
            if (errors.length === 0 && warnings.length === 0) {
                message = '✅ API validation passed!';
            }
            
            showNotification(message, errors.length === 0 ? 'success' : 'warning');
        }

        function clearData() {
            if (confirm('Are you sure you want to clear all data? This cannot be undone.')) {
                apiData = {
                    api_info: {
                        version: "2.0",
                        description: "Enhanced CineMax API with TMDB Integration",
                        last_updated: new Date().toISOString().split('T')[0],
                        total_movies: 0,
                        total_series: 0,
                        total_actors: 0,
                        total_genres: 0
                    },
                    movies: [],
                    series: [],
                    actors: [],
                    genres: [],
                    home: {
                        slides: [],
                        featured_movies: [],
                        channels: []
                    }
                };
                
                saveToLocalStorage();
                updateStats();
                renderResults();
                
                showNotification('✅ All data cleared successfully!', 'success');
            }
        }

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 5000);
        }

        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function saveToLocalStorage() {
            try {
                localStorage.setItem('cinemax_api_data', JSON.stringify(apiData));
            } catch (error) {
                console.error('Failed to save to localStorage:', error);
            }
        }

        function loadFromLocalStorage() {
            try {
                const saved = localStorage.getItem('cinemax_api_data');
                if (saved) {
                    apiData = JSON.parse(saved);
                    return true;
                }
            } catch (error) {
                console.error('Failed to load from localStorage:', error);
            }
            return false;
        }
    </script>
</body>
